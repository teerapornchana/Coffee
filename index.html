<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Brown - จองโต๊ะล่วงหน้า</title>
    <!-- Modern Fonts: Outfit and Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Brew & Brown</div>
    </nav>

    <!-- Main Content wrapper for Hero and overlapping form -->
    <main class="main-wrapper">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>จองโต๊ะล่วงหน้า<br>รับประกันที่นั่งสุดชิล</h1>
            </div>
        </section>

        <!-- Booking Form Section -->
        <section class="booking-section">
            <div class="booking-card">
                <h2>รายละเอียดการจอง</h2>
                <form id="bookingForm" class="booking-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">วันที่ต้องการจอง</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">รอบเวลา</label>
                            <select id="time" required>
                                <option value="" disabled selected>เลือกรอบเวลา</option>
                                <option value="10:00 - 11:30 น.">10:00 - 11:30 น.</option>
                                <option value="11:30 - 13:00 น.">11:30 - 13:00 น.</option>
                                <option value="13:00 - 14:30 น.">13:00 - 14:30 น.</option>
                                <option value="14:30 - 16:00 น.">14:30 - 16:00 น.</option>
                                <option value="16:00 - 17:30 น.">16:00 - 17:30 น.</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="guests">จำนวนคน</label>
                        <select id="guests" required>
                            <option value="" disabled selected>เลือกจำนวนคน</option>
                            <option value="1">1 ท่าน</option>
                            <option value="2">2 ท่าน</option>
                            <option value="3">3 ท่าน</option>
                            <option value="4">4 ท่าน</option>
                            <option value="5">5 ท่านขึ้นไป</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">ชื่อผู้จอง</label>
                            <input type="text" id="name" required placeholder="ระบุชื่อของคุณ">
                        </div>
                        <div class="form-group">
                            <label for="phone">เบอร์โทรศัพท์</label>
                            <input type="tel" id="phone" required placeholder="08x-xxx-xxxx" pattern="[0-9]{10}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="note">ความต้องการพิเศษ (ถ้ามี)</label>
                        <textarea id="note" rows="3" placeholder="เช่น ขอโต๊ะริมหน้าต่าง, เอาเก้าอี้เด็ก"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">ยืนยันการจองโต๊ะ</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Brew & Brown. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
